services:
  - type: web
    name: farm-ai-assistant-rag
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.7
      - key: OPENAI_API_KEY
        sync: false
      - key: APP_NAME
        value: Farm AI Assistant with RAG
      - key: APP_VERSION
        value: 2.0.0
      - key: ALLOWED_ORIGINS
        value: "*"
